version: 2
updates:
  - package-ecosystem: npm
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      anthropic-sdk:
        patterns: ["@anthropic-ai/*"]
      supabase:
        patterns: ["@supabase/*"]
      aws-sdk:
        patterns: ["@aws-sdk/*"]
      typescript-tooling:
        patterns: ["typescript", "tsx", "@types/*"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next-and-react:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      tailwind-and-ui:
        patterns: ["tailwindcss", "lucide-react"]
      supabase:
        patterns: ["@supabase/*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
