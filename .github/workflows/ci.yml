name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Vitest + TSC)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

  frontend:
    name: Frontend (TSC + Next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # NEXT_PUBLIC_* needed at build time. Dummy values for type-check / build.
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: dummy
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      SUPABASE_SECRET_KEY: dummy
    steps:
      - uses: actions/checkout@v7

      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next build
        run: npm run build

  audit-chain:
    name: Audit chain self-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run audit chain attack scenarios (4 included)
        run: npx vitest run src/lib/audit.test.ts
